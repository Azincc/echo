name: Build iOS

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.38.9

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          pub-cache: true

      - name: Cache build_runner
        uses: actions/cache@v5
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('lib/**/*.dart', 'test/**/*.dart', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Get version name
        id: version
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
          echo "name=v${version}" >> $GITHUB_OUTPUT

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA (Unsigned)
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v6
        with:
          name: app-release-ipa-unsigned-${{ steps.version.outputs.name }}
          path: app-release-unsigned.ipa
          retention-days: 5
