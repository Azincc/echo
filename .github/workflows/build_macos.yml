name: Build macOS

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.38.9

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          pub-cache: true

      - name: Cache build_runner
        uses: actions/cache@v5
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('lib/**/*.dart', 'test/**/*.dart', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Get version name
        id: version
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
          echo "name=v${version}" >> $GITHUB_OUTPUT

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive macOS Build
        run: cd build/macos/Build/Products/Release && zip -r ../../../../../macos-release.zip echo.app

      - name: Upload macOS Build
        uses: actions/upload-artifact@v6
        with:
          name: macos-release-${{ steps.version.outputs.name }}
          path: macos-release.zip
          retention-days: 5
