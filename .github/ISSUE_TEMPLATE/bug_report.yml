name: Bug 报告
description: 报告一个可复现的问题，帮助我们快速定位和修复
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供完整信息，避免来回补充上下文。
  - type: input
    id: app_version
    attributes:
      label: 应用版本
      description: 例如 v0.3.0（可在设置页或发布页查看）
      placeholder: v0.3.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 发生平台
      description: 请选择出现问题的平台
      options:
        - Android
        - iOS
        - macOS
        - Windows
        - Linux
        - Web
    validations:
      required: true
  - type: input
    id: backend
    attributes:
      label: 后端服务类型
      description: 例如 Navidrome / Gonic / Airsonic / 其他 Subsonic 兼容服务
      placeholder: Navidrome 0.54.5
    validations:
      required: true
  - type: textarea
    id: bug_description
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题现象
      placeholder: 点击播放后会立即暂停，且无法继续播放。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序填写，最好每步一行
      placeholder: |
        1. 打开应用并登录某音乐库
        2. 进入专辑详情页
        3. 点击任意歌曲播放
        4. 观察播放器状态
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你原本期望发生什么
      placeholder: 点击播放后应正常开始播放。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
      placeholder: 点击后显示播放 1 秒后自动暂停。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志或报错
      description: 可粘贴控制台输出、截图链接或错误堆栈
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 issues，确认不是重复问题
          required: true
        - label: 我已在最新版本中尝试复现该问题
          required: true
