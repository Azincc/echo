name: Build Windows

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.38.9

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-key: flutter-sdk-${{ runner.os }}-stable-${{ env.FLUTTER_VERSION }}-${{ runner.arch }}
          pub-cache-key: flutter-pub-${{ runner.os }}-stable-${{ env.FLUTTER_VERSION }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Cache build_runner
        uses: actions/cache@v5
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('lib/**/*.dart', 'test/**/*.dart', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Get version name
        id: version
        shell: pwsh
        run: |
          $line = (Get-Content pubspec.yaml | Where-Object { $_ -match '^version:\s*' } | Select-Object -First 1)
          if (-not $line) { throw "Cannot find version in pubspec.yaml" }
          $version = ($line -replace '^version:\s*', '').Trim().Split('+')[0]
          "name=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows Build
        run: Compress-Archive -Path build/windows/runner/Release/* -DestinationPath windows-release.zip

      - name: Upload Windows Build
        uses: actions/upload-artifact@v6
        with:
          name: windows-release-${{ steps.version.outputs.name }}
          path: windows-release.zip
