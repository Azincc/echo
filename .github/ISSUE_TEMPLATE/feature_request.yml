name: 功能请求
description: 提出新功能或改进建议
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法。请描述清楚“为什么需要”与“希望如何实现”。
  - type: textarea
    id: pain_point
    attributes:
      label: 背景与痛点
      description: 当前使用中遇到了什么问题，为什么现有方案不够好
      placeholder: 例如：多音乐库切换时，希望按最近使用自动排序，当前需要手动查找。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你希望新增或改进什么能力
      placeholder: 例如：在侧栏中按最近使用时间排序音乐库，并支持固定收藏库到顶部。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他做法（可选）
      placeholder: 例如：仅增加搜索框也能部分解决。
  - type: dropdown
    id: platform
    attributes:
      label: 影响平台
      description: 该需求主要影响哪些平台
      multiple: true
      options:
        - Android
        - iOS
        - macOS
        - Windows
        - Linux
        - Web
        - 所有平台
  - type: textarea
    id: additional_context
    attributes:
      label: 其他补充
      description: 可附设计稿、竞品示例、截图或 API 文档链接
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 issues，确认不是重复需求
          required: true
