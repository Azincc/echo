name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Get version name
        id: version
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
          echo "name=v${version}" >> $GITHUB_OUTPUT

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux Build
        run: cd build/linux/x64/release/bundle && zip -r ../../../../../linux-release.zip .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-${{ steps.version.outputs.name }}
          path: linux-release.zip
