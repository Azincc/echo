name: Build Linux

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.38.9

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Cache build_runner
        uses: actions/cache@v5
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('lib/**/*.dart', 'test/**/*.dart', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Get version name
        id: version
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | awk '{print $2}' | cut -d'+' -f1)
          echo "name=v${version}" >> $GITHUB_OUTPUT

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux Build
        run: cd build/linux/x64/release/bundle && zip -r ../../../../../linux-release.zip .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-${{ steps.version.outputs.name }}
          path: linux-release.zip
