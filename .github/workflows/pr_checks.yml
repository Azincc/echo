name: PR Checks

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache build_runner
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('lib/**/*.dart', 'test/**/*.dart', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Fail if generated files changed
        shell: bash
        run: |
          if [[ -n "$(git status --short --untracked-files=all)" ]]; then
            git status --short --untracked-files=all
            echo "::error::Generated files are not up to date. Run build_runner and commit the updated files."
            exit 1
          fi

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test
